  profile:
    name: Gijs Overgoor
    title: Assistant Professor of Marketing
    institution: SMU Cox School of Business
    location: Dallas, Texas, USA
    email: govergoor@smu.edu
    website: gijsovergoor.com
    portrait_alt: Gijs Overgoor, Assistant Professor of Marketing at SMU Cox School of Business
    positioning: I am an Assistant Professor of Marketing at Southern Methodist University Cox School
      of Business. I develop and validate AI-based measures for unstructured marketing data. My primary
      substantive areas are advertising and digital platforms, with a specific focus on visual content.
      A complementary research stream examines platform misinformation and fake-review detection. I use
      a multi-method approach that combines AI and machine learning with econometrics, surveys and experiments,
      and neuroscience. I also study AI itself, including its use in marketing and the validity of AI-based
      annotation and measurement.
    short_positioning: I study advertising and digital platforms, with a particular focus on visual content.
      My work combines AI, econometrics, surveys and experiments, and neuroscience.
