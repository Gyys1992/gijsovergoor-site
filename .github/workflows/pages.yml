name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install project
        run: python -m pip install --editable ".[dev]"
      - name: Run tests and lint
        run: |
          python -m pytest
          python -m ruff check site_builder tests
      - name: Verify public-content approval
        run: |
          python -c "from pathlib import Path; from site_builder.approval import require_approval; require_approval(Path('data/public/snapshot.yaml'), Path('data/public/APPROVED.sha256'))"
      - name: Build static site
        run: python -m site_builder.build
      - name: Validate generated site
        run: python -m site_builder.validate
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
